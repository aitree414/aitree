<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BackTester - 投資回測工具</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="#">BackTester</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#stocks-section">選股</a></li>
        <li class="nav-item"><a class="nav-link" href="#params-section">參數</a></li>
        <li class="nav-item"><a class="nav-link" href="#results-section">結果</a></li>
        <li class="nav-item"><a class="nav-link" href="ma-strategy.html">MA 策略</a></li>
        <li class="nav-item"><a class="nav-link" href="horse-race.html">策略競賽</a></li>
        <li class="nav-item"><a class="nav-link" href="web3.html">Web3</a></li>
        <li class="nav-item"><a class="nav-link" href="guide.html">新手指南</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="text-muted">正在抓取資料並計算...</div>
</div>

<div class="container py-4">

  <!-- Alert Box -->
  <div id="alert-box" class="alert" style="display:none;" role="alert"></div>

  <!-- Header -->
  <div class="mb-4">
    <h1 class="h3 fw-bold mb-1">投資回測工具</h1>
    <p class="text-muted mb-0">比較多標的回測績效 | 支援單筆 / 定期定額策略</p>
  </div>

  <form id="backtest-form">

    <!-- Stock Selection -->
    <div class="section-card" id="stocks-section">
      <div class="section-title">選擇標的</div>

      <!-- Search -->
      <div class="position-relative mb-3">
        <input
          type="text"
          id="stock-search"
          class="form-control"
          placeholder="搜尋股票代碼或名稱（如：台積電、AAPL、2330）"
          autocomplete="off"
        />
        <div id="search-dropdown" class="search-dropdown" style="display:none;"></div>
      </div>

      <!-- Quick Buttons -->
      <div class="mb-3">
        <div class="text-muted small mb-2">快速選擇：</div>
        <div id="quick-buttons"></div>
      </div>

      <!-- Selected Stocks -->
      <div>
        <div class="text-muted small mb-1">已選標的：</div>
        <div id="selected-stocks"><span class="text-muted small">尚未選擇標的</span></div>
      </div>
    </div>

    <!-- Backtest Parameters -->
    <div class="section-card" id="params-section">
      <div class="section-title">回測參數</div>
      <div class="row g-3">
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">開始日期</label>
          <input type="date" id="start-date" class="form-control" required />
        </div>
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">結束日期</label>
          <input type="date" id="end-date" class="form-control" required />
        </div>
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">策略</label>
          <select id="strategy" class="form-select">
            <option value="lump_sum">單筆投資</option>
            <option value="dca">定期定額（DCA）</option>
          </select>
        </div>
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">投資金額（$）</label>
          <input type="number" id="amount" class="form-control" value="100000" min="1" required />
        </div>
      </div>

      <!-- DCA Options -->
      <div id="dca-options" style="display:none;" class="mt-3">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label small fw-semibold">投資頻率</label>
            <select id="frequency" class="form-select">
              <option value="monthly">每月</option>
              <option value="weekly">每週</option>
            </select>
          </div>
        </div>
        <div class="alert alert-info mt-2 py-2 small">
          定期定額模式：每月/週的第一個交易日投入指定金額。
        </div>
      </div>

      <div class="mt-3 d-flex gap-2 flex-wrap">
        <button type="submit" class="btn btn-primary px-4">
          執行回測
        </button>
        <button type="button" id="export-btn" class="btn btn-outline-secondary no-print" style="display:none;">
          匯出報告
        </button>
      </div>
    </div>

  </form>

  <!-- Summary Cards -->
  <div id="results-section" style="display:none;">
    <div class="section-card">
      <div class="section-title">回測摘要</div>
      <div class="row" id="summary-cards"></div>
    </div>

    <!-- Results Table -->
    <div class="section-card">
      <div class="section-title">績效比較</div>
      <div id="results-table"></div>
    </div>
  </div>

  <!-- Charts -->
  <div id="charts-section" style="display:none;">
    <div class="row">
      <div class="col-12">
        <div class="chart-card">
          <div class="chart-title">淨值走勢</div>
          <div class="chart-container">
            <canvas id="portfolio-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="chart-card">
          <div class="chart-title">報酬率比較</div>
          <div class="chart-container">
            <canvas id="return-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="chart-card">
          <div class="chart-title">風險雷達圖</div>
          <div class="chart-container">
            <canvas id="radar-chart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-12">
        <div class="chart-card">
          <div class="chart-title">最大回撤分析</div>
          <div class="chart-container">
            <canvas id="drawdown-chart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<footer class="border-top py-3 mt-4 no-print">
  <div class="container text-center text-muted small">
    BackTester &mdash; 資料來源：Yahoo Finance | 僅供參考，非投資建議
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
