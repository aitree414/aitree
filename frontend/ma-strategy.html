<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MA 均線策略 - BackTester</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">BackTester</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">回測工具</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">MA 策略</a></li>
        <li class="nav-item"><a class="nav-link" href="horse-race.html">策略競賽</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="text-muted">正在計算均線策略...</div>
</div>

<div class="container py-4">

  <!-- Alert Box -->
  <div id="alert-box" class="alert" style="display:none;" role="alert"></div>

  <!-- Header -->
  <div class="mb-4">
    <h1 class="h3 fw-bold mb-1">MA 均線交叉策略</h1>
    <p class="text-muted mb-0">黃金交叉買入、死亡交叉賣出 vs Buy &amp; Hold 比較</p>
  </div>

  <form id="ma-form">

    <!-- Stock Selection -->
    <div class="section-card">
      <div class="section-title">選擇標的（單一）</div>

      <div class="position-relative mb-3">
        <input
          type="text"
          id="stock-search"
          class="form-control"
          placeholder="搜尋股票代碼或名稱"
          autocomplete="off"
        />
        <div id="search-dropdown" class="search-dropdown" style="display:none;"></div>
      </div>

      <div class="mb-3">
        <div class="text-muted small mb-2">快速選擇：</div>
        <div id="quick-buttons"></div>
      </div>

      <div id="selected-stock-display" class="text-primary small fw-semibold">尚未選擇標的</div>
    </div>

    <!-- Parameters -->
    <div class="section-card">
      <div class="section-title">策略參數</div>

      <div class="row g-3">
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">開始日期</label>
          <input type="date" id="start-date" class="form-control" required />
        </div>
        <div class="col-md-3 col-6">
          <label class="form-label small fw-semibold">結束日期</label>
          <input type="date" id="end-date" class="form-control" required />
        </div>
        <div class="col-md-2 col-6">
          <label class="form-label small fw-semibold">短期均線（天）</label>
          <input type="number" id="short-window" class="form-control" value="20" min="5" max="200" required />
        </div>
        <div class="col-md-2 col-6">
          <label class="form-label small fw-semibold">長期均線（天）</label>
          <input type="number" id="long-window" class="form-control" value="60" min="10" max="500" required />
        </div>
        <div class="col-md-2 col-6">
          <label class="form-label small fw-semibold">初始金額（$）</label>
          <input type="number" id="amount" class="form-control" value="100000" min="1" required />
        </div>
      </div>

      <div class="alert alert-info mt-3 py-2 small">
        <strong>黃金交叉：</strong>短期均線由下往上穿越長期均線 → 買入信號。<br />
        <strong>死亡交叉：</strong>短期均線由上往下穿越長期均線 → 賣出信號。
      </div>

      <div class="mt-3">
        <button type="submit" class="btn btn-primary px-4">執行 MA 回測</button>
      </div>
    </div>

  </form>

  <!-- Results -->
  <div id="results-section" style="display:none;">

    <!-- Strategy label -->
    <div class="d-flex align-items-center gap-2 mb-3">
      <span class="badge bg-primary strategy-badge fs-6" id="ma-strategy-label">MA 策略</span>
    </div>

    <!-- Metrics Comparison -->
    <div class="section-card">
      <div class="section-title">績效對比：MA 策略 vs Buy &amp; Hold</div>
      <div id="metrics-comparison"></div>
    </div>

    <!-- MA Price Chart -->
    <div class="chart-card">
      <div class="chart-title">均線走勢圖（含買賣信號）</div>
      <div class="chart-container" style="height:350px;">
        <canvas id="ma-chart"></canvas>
      </div>
    </div>

    <!-- Portfolio Value Chart -->
    <div class="chart-card">
      <div class="chart-title">持倉價值：MA 策略 vs Buy &amp; Hold</div>
      <div class="chart-container">
        <canvas id="ma-portfolio-chart"></canvas>
      </div>
    </div>

    <!-- Trades Table -->
    <div class="section-card">
      <div class="section-title">交易記錄</div>
      <div id="trades-table"></div>
    </div>

  </div>

</div><!-- /container -->

<footer class="border-top py-3 mt-4 no-print">
  <div class="container text-center text-muted small">
    BackTester &mdash; 資料來源：Yahoo Finance | 僅供參考，非投資建議
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/charts.js"></script>
<script src="js/ma-app.js"></script>
</body>
</html>
