<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日策略競賽 - BackTester</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand" href="index.html">BackTester</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">回測工具</a></li>
        <li class="nav-item"><a class="nav-link" href="ma-strategy.html">MA 策略</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">策略競賽</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Loading Overlay -->
<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="text-muted">正在載入報告...</div>
</div>

<div class="container py-4">

  <!-- Alert Box -->
  <div id="alert-box" class="alert" style="display:none;" role="alert"></div>

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
    <div>
      <h1 class="h3 fw-bold mb-1">每日策略競賽</h1>
      <p class="text-muted mb-0">4 大策略模擬持倉每日排行 &mdash; <span id="report-date" class="fw-semibold text-dark"></span></p>
    </div>
    <div class="d-flex gap-2">
      <button id="btn-today" class="btn btn-primary">載入今日報告</button>
      <button id="btn-live" class="btn btn-outline-secondary">即時掃描</button>
    </div>
  </div>

  <!-- Report Section -->
  <div id="report-section" style="display:none;">

    <!-- Strategy Cards -->
    <div class="row" id="cards-grid"></div>

    <!-- Cross-Strategy Overlaps -->
    <div id="overlap-section"></div>

    <!-- Portfolio Summary -->
    <div id="portfolio-section"></div>

  </div>

</div><!-- /container -->

<footer class="border-top py-3 mt-4 no-print">
  <div class="container text-center text-muted small">
    BackTester &mdash; 資料來源：Yahoo Finance | 僅供參考，非投資建議
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/horse-race-app.js"></script>
</body>
</html>
